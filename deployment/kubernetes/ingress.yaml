apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-support-backend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rps: "50"
spec:
  tls:
  - hosts:
    - api.enterprise-ai.support
    secretName: ai-support-tls-cert
  rules:
  - host: api.enterprise-ai.support
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-support-backend-service
            port:
              number: 8000
