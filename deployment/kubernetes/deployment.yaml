apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-support-backend
  namespace: default
  labels:
    app: ai-support-backend
    tier: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-support-backend
  template:
    metadata:
      labels:
        app: ai-support-backend
    spec:
      containers:
      - name: gateway
        image: us-central1-docker.pkg.dev/enterprise-prod-99/ai-support/backend-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 250m
            memory: 512Mi
        env:
        - name: ENV
          value: "production"
        - name: PORT
          value: "8000"
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-support-secrets
              key: gemini-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-support-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-support-secrets
  namespace: default
type: Opaque
stringData:
  gemini-api-key: "PLACEHOLDER_ENTERPRISE_API_KEY_SECURE_VAULT"
  jwt-secret: "PLACEHOLDER_HMAC_SHA256_JWT_TOKEN_PRIVATE_KEY"
