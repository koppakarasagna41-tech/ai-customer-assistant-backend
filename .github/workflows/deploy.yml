name: Enterprise CI/CD Deployment Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Authenticate to Google Cloud
      if: env.GCP_SA_KEY != null
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Configure Docker for Google Artifact Registry
      if: env.GCP_SA_KEY != null
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ secrets.GCP_SA_KEY != null }}
        tags: |
          us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-support-registry/backend-gateway:latest
          us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-support-registry/backend-gateway:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to Google Cloud Run
      if: env.GCP_SA_KEY != null
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ai-support-backend-gateway
        image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-support-registry/backend-gateway:${{ github.sha }}
        region: us-central1
        env_vars: |
          ENV=production
          PORT=8080
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60
        secrets: |
          GEMINI_API_KEY=GEMINI_API_KEY:latest
          JWT_SECRET=JWT_SECRET:latest

    # Backup Deployment to Render via Deploy Hook
    - name: Deploy to Render Service
      if: secrets.RENDER_DEPLOY_HOOK_URL != null
      run: |
        curl -f "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
