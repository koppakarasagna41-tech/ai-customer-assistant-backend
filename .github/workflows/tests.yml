name: Enterprise CI/CD Validation Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy pytest pytest-asyncio pytest-cov httpx fastapi pydantic pyjwt cryptography

    - name: Run Ruff Code Linter
      run: ruff check app tests

    - name: Run Black Code Formatter Check
      run: black --check app tests

    - name: Run Mypy Static Type Checker
      run: mypy --ignore-missing-imports app

    - name: Run Pytest Suite with Coverage
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing tests/

    - name: Upload Coverage Reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
