name: Enterprise CI/CD Validation Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Project Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy pytest pytest-asyncio pytest-cov

      - name: Run Ruff Code Linter
        run: python -m ruff check .

      - name: Run Black Code Formatter Check
        run: python -m black --check .

      - name: Run Pytest Suite with Coverage
        env:
          DATABASE_URL: sqlite:///:memory:
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-report=term-missing tests/

      - name: Upload Coverage Reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false