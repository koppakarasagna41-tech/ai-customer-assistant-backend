version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-ai-support-backend:latest
    container_name: ai_support_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - enterprise_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ai_support_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - enterprise_net

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ai_support_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - enterprise_net

  grafana:
    image: grafana/grafana:10.0.0
    container_name: ai_support_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - enterprise_net

networks:
  enterprise_net:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
